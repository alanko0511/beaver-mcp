<!doctype html>
<meta charset="utf-8" />
<style>
	:root {
		color-scheme: light dark;
		--bg: #ffffff;
		--fg: #1a1a1a;
		--muted: #6b7280;
		--border: #e5e7eb;
		--hover: #f5f5f5;
		--accent: #2563eb;
	}
	:root.dark {
		--bg: #1c1c1e;
		--fg: #f3f4f6;
		--muted: #9ca3af;
		--border: #333338;
		--hover: #2a2a2e;
		--accent: #60a5fa;
	}
	body {
		font: 14px/1.4 system-ui, sans-serif;
		margin: 0;
		background: var(--bg);
		color: var(--fg);
	}
	#map {
		width: 100%;
		height: 320px;
		background: var(--hover);
	}
	#status {
		padding: 16px;
		color: var(--muted);
	}
	#list {
		list-style: none;
		margin: 0;
		padding: 0;
		max-height: 280px;
		overflow-y: auto;
	}
	#list li {
		padding: 10px 14px;
		border-top: 1px solid var(--border);
		cursor: pointer;
	}
	#list li:hover {
		background: var(--hover);
	}
	.name {
		font-weight: 600;
	}
	.sub {
		color: var(--muted);
		font-size: 12px;
		margin-top: 2px;
	}
	.actions {
		margin-top: 6px;
		display: flex;
		gap: 8px;
	}
	.actions button {
		font: 12px system-ui, sans-serif;
		padding: 3px 10px;
		border: 1px solid var(--border);
		border-radius: 6px;
		background: transparent;
		color: var(--accent);
		cursor: pointer;
	}
	.actions button:hover {
		background: var(--hover);
	}
	.open-now {
		color: #16a34a;
	}
	.closed {
		color: #dc2626;
	}
</style>
<div id="map"></div>
<div id="status">Waiting for search results…</div>
<ul id="list"></ul>
<script type="module">
	/*__EXT_APPS_BUNDLE__*/
	// ExtAppsShim is only ever set by the /widget-preview dev route (fake host for browser iteration).
	const { App } = globalThis.ExtAppsShim ?? globalThis.ExtApps;

	const GOOGLE_MAPS_KEY = "__GOOGLE_MAPS_BROWSER_KEY__";
	const statusEl = document.getElementById("status");
	const listEl = document.getElementById("list");

	let map;
	let markers = [];
	let mapsReady;

	function loadGoogleMaps() {
		if (mapsReady) return mapsReady;
		mapsReady = new Promise((resolveReady, rejectReady) => {
			const script = document.createElement("script");
			script.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(GOOGLE_MAPS_KEY)}&v=weekly&loading=async&callback=__initMap`;
			script.async = true;
			script.onerror = () => rejectReady(new Error("Failed to load Google Maps JS API"));
			globalThis.__initMap = () => resolveReady();
			document.head.append(script);
		});
		return mapsReady;
	}

	function clearMarkers() {
		for (const marker of markers) marker.setMap(null);
		markers = [];
	}

	async function renderPlaces(app, payload) {
		const places = (payload.places ?? []).filter(
			(p) => p.latitude !== undefined && p.longitude !== undefined,
		);
		statusEl.textContent = places.length
			? `${places.length} result${places.length === 1 ? "" : "s"} for “${payload.query}”`
			: `No results for “${payload.query}”`;

		listEl.innerHTML = "";
		for (const place of payload.places ?? []) {
			const li = document.createElement("li");
			const rating = place.rating ? ` · ★ ${place.rating}` : "";
			const open =
				place.openNow === undefined
					? ""
					: place.openNow
						? ' · <span class="open-now">open now</span>'
						: ' · <span class="closed">closed</span>';
			li.innerHTML = `
				<div class="name"></div>
				<div class="sub">${place.address ? "" : "—"}${rating}${open}</div>
				<div class="actions">
					<button data-action="maps">Open in Maps</button>
					<button data-action="directions">Directions</button>
					<button data-action="pick">Choose</button>
				</div>`;
			li.querySelector(".name").textContent = place.name;
			if (place.address) {
				li.querySelector(".sub").prepend(place.address);
			}
			li.addEventListener("click", (event) => {
				const action = event.target.dataset?.action;
				if (action === "maps" && place.mapsUrl) {
					app.openLink({ url: place.mapsUrl });
				} else if (action === "directions" && place.directionsUrl) {
					app.openLink({ url: place.directionsUrl });
				} else if (action === "pick") {
					app.sendMessage({
						role: "user",
						content: [
							{
								type: "text",
								text: `I picked "${place.name}" (${place.address ?? "no address"}, place_id: ${place.placeId})`,
							},
						],
					});
				} else if (place.latitude !== undefined && map) {
					map.panTo({ lat: place.latitude, lng: place.longitude });
					map.setZoom(16);
				}
			});
			listEl.append(li);
		}

		if (!places.length) return;
		try {
			await loadGoogleMaps();
		} catch (err) {
			statusEl.textContent = `${statusEl.textContent} (map unavailable: ${err.message})`;
			return;
		}

		if (!map) {
			map = new google.maps.Map(document.getElementById("map"), {
				center: { lat: places[0].latitude, lng: places[0].longitude },
				zoom: 14,
				mapTypeControl: false,
				streetViewControl: false,
				fullscreenControl: false,
			});
		}
		clearMarkers();
		const bounds = new google.maps.LatLngBounds();
		for (const place of places) {
			const position = { lat: place.latitude, lng: place.longitude };
			const marker = new google.maps.Marker({ map, position, title: place.name });
			marker.addListener("click", () => {
				if (place.mapsUrl) app.openLink({ url: place.mapsUrl });
			});
			markers.push(marker);
			bounds.extend(position);
		}
		if (places.length === 1) {
			map.setCenter(bounds.getCenter());
			map.setZoom(16);
		} else {
			map.fitBounds(bounds, 32);
		}
	}

	function applyTheme(hostContext) {
		document.documentElement.classList.toggle("dark", hostContext?.theme === "dark");
	}

	(async () => {
		const app = new App({ name: "BeaverMapSearch", version: "0.1.0" }, {}, { autoResize: true });

		app.ontoolresult = (result) => {
			const textBlock = (result.content ?? []).find((block) => block.type === "text");
			if (!textBlock) return;
			try {
				renderPlaces(app, JSON.parse(textBlock.text));
			} catch (err) {
				statusEl.textContent = `Could not parse tool result: ${err.message}`;
			}
		};
		app.onhostcontextchanged = ({ hostContext }) => applyTheme(hostContext);

		await app.connect();
		applyTheme(app.getHostContext());
	})();
</script>
